function LocSel({val,set}){
  const [q,setQ]=useState("");
  const paises=Object.keys(PAISES).filter(p=>!q||p.toLowerCase().includes(q.toLowerCase()));
  const regs=val.pais?Object.keys(PAISES[val.pais]||{}):[]; 
  const provs=val.reg?Object.keys((PAISES[val.pais]||{})[val.reg]||{}):[]; 
  const ciudades=val.prov?((PAISES[val.pais]||{})[val.reg]||{})[val.prov]||[]:[];
  const pick=(f,v)=>{const u={...val,[f]:v};if(f==="pais"){u.reg="";u.prov="";u.ciudad="";}if(f==="reg"){u.prov="";u.ciudad="";}if(f==="prov")u.ciudad="";set(u);};
  const s={width:"100%",background:C.card2,border:`1px solid #2A2A2A`,borderRadius:10,padding:"10px 12px",color:C.text,fontSize:14,outline:"none",appearance:"none",marginBottom:8,...ff};
  return <div>
    <div style={{position:"relative",marginBottom:8}}>
      <span style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)"}}>🔍</span>
      <input style={{...s,paddingLeft:34,marginBottom:0}} placeholder="Buscar país..." value={q} onChange={e=>{setQ(e.target.value);if(val.pais)set({pais:"",reg:"",prov:"",ciudad:"",});}}/>
    </div>
    <select style={s} value={val.pais||""} onChange={e=>pick("pais",e.target.value)}><option value="">— País —</option>{paises.map(p=><option key={p} value={p}>{p}</option>)}</select>
    {regs.length>0&&<select style={s} value={val.reg||""} onChange={e=>pick("reg",e.target.value)}><option value="">— Región —</option>{regs.map(r=><option key={r} value={r}>{r}</option>)}</select>}
    {provs.length>0&&<select style={s} value={val.prov||""} onChange={e=>pick("prov",e.target.value)}><option value="">— Provincia —</option>{provs.map(p=><option key={p} value={p}>{p}</option>)}</select>}
    {ciudades.length>0&&<select style={s} value={val.ciudad||""} onChange={e=>pick("ciudad",e.target.value)}><option value="">— Ciudad —</option>{ciudades.map(c=><option key={c} value={c}>{c}</option>)}</select>}
  </div>;
}

        {/* Hero de acceso */}

              <span style={{fontSize:28}}>🍽</span>
            </div>
            <div style={{...pf,fontSize:22,fontWeight:900,color:C.text,marginBottom:4}}>Xantar Pro</div>

            <div>
              <div style={{fontWeight:700,fontSize:15,color:C.text}}>{detail?.name}</div>
              <div style={{fontSize:12,color:C.muted,marginTop:2}}>{detail?.city} · {detail?.country?.split(" ")[0]}</div>
            </div>
            <div style={{marginLeft:"auto"}}><Badge bg="#1A1A3A" color={C.purple}>🔑 Verificado</Badge></div>
          </div>:<div style={{background:"#111",border:`1px solid #2A2A5A`,borderRadius:14,padding:"14px 16px",marginBottom:28,display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:44,height:44,borderRadius:10,background:"linear-gradient(135deg,#1A1A3A,#2A2A5A)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>🏪</div>
            <div>
              <div style={{fontWeight:700,fontSize:15,color:C.text}}>Panel de propietarios</div>
              <div style={{fontSize:12,color:C.muted,marginTop:2}}>Accede con tus credenciales de Xantar Pro</div>
            </div>
          </div>}

          {/* Formulario login */}
          <div style={{marginBottom:14}}>
            <div style={{fontSize:12,color:C.muted,marginBottom:6,fontWeight:600}}>Correo electrónico</div>
            <input
              style={{...inp,padding:"14px 16px"}}
              type="email"
              placeholder="propietario@restaurante.com"
              value={email}
              onChange={e=>{setEmail(e.target.value);setLoginErr(false);}}
              onKeyDown={e=>e.key==="Enter"&&tryLogin()}
            />
          </div>
          <div style={{marginBottom:8}}>
            <div style={{fontSize:12,color:C.muted,marginBottom:6,fontWeight:600}}>Contraseña</div>

                style={{...inp,padding:"14px 16px",paddingRight:50}}

                value={pass}
                onChange={e=>{setPass(e.target.value);setLoginErr(false);}}
                onKeyDown={e=>e.key==="Enter"&&tryLogin()}
              />
              <button onClick={()=>setShowPass(s=>!s)} style={{...ff,position:"absolute",right:14,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:C.muted,fontSize:12,cursor:"pointer"}}>{showPass?"Ocultar":"Ver"}</button>

          </div>

          {loginErr&&<div style={{background:"#1A0808",border:`1px solid #4A1A1A`,borderRadius:10,padding:"10px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:8}}>

          </div>}

          <div style={{textAlign:"right",marginBottom:20}}>
            <span style={{fontSize:13,color:C.gold,cursor:"pointer"}}>¿Olvidaste tu contraseña?</span>
          </div>

          <button onClick={tryLogin} style={{...ff,width:"100%",background:"linear-gradient(135deg,#D4A853,#C41E3A)",border:"none",borderRadius:14,padding:"16px",color:"#fff",fontWeight:700,fontSize:16,cursor:"pointer",boxShadow:"0 4px 20px rgba(212,168,83,0.3)",marginBottom:20}}>

          {/* Info demo */}
          <div style={{background:"#0D0D1A",border:`1px solid #1A1A3A`,borderRadius:12,padding:"12px 14px"}}>

            <div style={{fontSize:12,color:"#444",lineHeight:1.7}}>
              Email: <span style={{color:C.purple}}>propietario@demo.com</span><br/>
              Contraseña: <span style={{color:C.purple}}>xantar</span>
            </div>
          </div>
        </div>
      </>}

      {/* ── SOLICITAR ACCESO ── */}
      {step==="request"&&<>
        <div style={{padding:"16px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:`1px solid #1A1A1A`}}>

          <div style={{width:40}}/>

        <div style={{padding:"20px 24px 40px"}}>
          {!reqSent?<>
            <div style={{marginBottom:24}}>

            {[
              {ico:"📅",t:"Gestión de reservas",d:"Publica disponibilidad en tiempo real y notifica a los usuarios."},
              {ico:"🖼",t:"Imagen de portada",d:"Personaliza cómo aparece tu restaurante en la app."},
              {ico:"📊",t:"Estadísticas",d:"Consulta visitas, seguidores y reseñas de tu local."},
              {ico:"🔔",t:"Notificaciones push",d:"Llega directamente a los usuarios interesados en tu restaurante."},
            ].map(({ico,t,d})=>(
              <div key={t} style={{display:"flex",gap:14,marginBottom:18}}>
                <div style={{width:40,height:40,borderRadius:12,background:"#1A1A2A",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{ico}</div>
                <div><div style={{fontWeight:600,fontSize:14,color:C.text,marginBottom:2}}>{t}</div><div style={{fontSize:12,color:C.muted,lineHeight:1.5}}>{d}</div></div>

            <div style={{borderTop:`1px solid #1A1A1A`,paddingTop:20,marginTop:4}}>
              <div style={{...pf,fontSize:16,fontWeight:700,marginBottom:16}}>Tus datos de contacto</div>
              {[
                {label:"Nombre completo",ph:"Ej: Juan García",key:"nombre"},

                {label:"Teléfono de contacto",ph:"+34 600 000 000",key:"telefono"},
                {label:"Email de contacto",ph:"info@turestaurante.com",key:"email"},
              ].map(({label,ph,key})=>(
                <div key={key} style={{marginBottom:14}}>
                  <div style={{fontSize:12,color:C.muted,marginBottom:6,fontWeight:600}}>{label}</div>
                  <input style={{...inp,padding:"13px 16px"}} placeholder={ph} value={req[key]} onChange={e=>setReq(r=>({...r,[key]:e.target.value}))}/>
                </div>
              ))}

              {/* Reclamar local existente — mismo formato que registro propietario */}
              <div style={{background:"#0D0D1A",border:`1px solid #2A2A5A`,borderRadius:14,padding:16,marginBottom:16}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                  <div style={{width:40,height:40,borderRadius:12,background:"linear-gradient(135deg,#D4A853,#C41E3A)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>🏛</div>
                  <div>
                    <div style={{fontWeight:700,fontSize:14,color:C.text}}>¿Tu restaurante ya está en Xantar?</div>
                    <div style={{fontSize:11,color:C.muted,marginTop:2}}>Reclámalo con tu CIF y obtén verificación oficial</div>
                  </div>
                </div>

                {/* Buscador */}
                <div style={{fontSize:11,color:C.muted,marginBottom:6,fontWeight:600,textTransform:"uppercase",letterSpacing:0.6}}>🔍 Busca tu restaurante</div>
                <input
                  style={{...inp,marginBottom:8}}
                  placeholder="Nombre del restaurante..."
                  value={req.claimSearch||""}
                  onChange={e=>setReq(r=>({...r,claimSearch:e.target.value,claimRest:null}))}
                />
                {req.claimSearch&&req.claimSearch.length>1&&(()=>{
                  const matches=rests.filter(r=>r.addedBy&&r.name.toLowerCase().includes(req.claimSearch.toLowerCase()));
                  if(!matches.length)return <div style={{fontSize:12,color:"#555",marginBottom:10,padding:"10px 12px",background:"#111",borderRadius:10,textAlign:"center"}}>😕 No encontrado entre los restaurantes de comunidad</div>;
                  return <div style={{marginBottom:10,borderRadius:10,overflow:"hidden",border:"1px solid #2A2A2A"}}>
                    {matches.map(r=>(
                      <div key={r.id} onClick={()=>setReq(rv=>({...rv,claimRest:r,claimSearch:r.name,restaurante:r.name}))} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",cursor:"pointer",background:req.claimRest?.id===r.id?"#1A1A05":"#111",borderBottom:"1px solid #1A1A1A"}}>
                        <img src={r.img} style={{width:40,height:40,borderRadius:8,objectFit:"cover",flexShrink:0}} alt=""/>
                        <div style={{flex:1}}>
                          <div style={{fontWeight:600,fontSize:13,color:req.claimRest?.id===r.id?C.gold:C.text}}>{r.name}</div>
                          <div style={{fontSize:11,color:C.muted,marginTop:1}}>👥 @{r.addedBy} · {r.city} · {r.spec}</div>
                        </div>
                        {req.claimRest?.id===r.id&&<span style={{color:C.gold,fontSize:18}}>✓</span>}
                      </div>
                    ))}
                  </div>;
                })()}

                {req.claimRest&&<>
                  {/* Restaurante seleccionado */}
                  <div style={{background:"#1A1A05",border:`1px solid ${C.gold}44`,borderRadius:10,padding:"10px 12px",marginBottom:14,display:"flex",alignItems:"center",gap:10}}>
                    <img src={req.claimRest.img} style={{width:44,height:44,borderRadius:8,objectFit:"cover",flexShrink:0}} alt=""/>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:14,color:C.gold}}>{req.claimRest.name}</div>
                      <div style={{fontSize:11,color:C.muted,marginTop:2}}>{req.claimRest.city} · Añadido por @{req.claimRest.addedBy}</div>
                    </div>
                    <Badge bg="#1A1A3A" color={C.purple}>🔑 Verificando</Badge>
                  </div>

                  {/* CIF */}
                  <div style={{marginBottom:14}}>
                    <div style={{fontSize:11,color:C.muted,marginBottom:6,fontWeight:600,textTransform:"uppercase",letterSpacing:0.6}}>🏛 CIF de la empresa <span style={{color:C.red}}>*</span></div>

                      style={{...inp,fontFamily:"monospace",letterSpacing:3,textTransform:"uppercase",fontSize:16,fontWeight:700,textAlign:"center"}}
                      placeholder="B12345678"
                      value={req.cif||""}
                      onChange={e=>setReq(r=>({...r,cif:e.target.value.toUpperCase()}))}
                      maxLength={9}

                  {/* Teléfono de contacto */}
                  <div style={{marginBottom:14}}>

                    <input style={{...inp}} placeholder="+34 600 000 000" value={req.telefono||""} onChange={e=>setReq(r=>({...r,telefono:e.target.value}))}/>
                  </div>

                  {/* Web oficial */}
                  <div style={{marginBottom:14}}>
                    <div style={{fontSize:11,color:C.muted,marginBottom:6,fontWeight:600,textTransform:"uppercase",letterSpacing:0.6}}>🌐 Web oficial <span style={{fontSize:10,color:"#555",fontWeight:400,textTransform:"none"}}>(opcional)</span></div>
                    <input style={{...inp}} placeholder="https://turestaurante.com" value={req.web||""} onChange={e=>setReq(r=>({...r,web:e.target.value}))}/>
                  </div>

                  {/* Aviso badge descubridor */}
                  <div style={{background:"#1A1005",border:`1px solid #3A3010`,borderRadius:10,padding:"10px 12px",display:"flex",gap:8,alignItems:"flex-start"}}>
                    <span style={{fontSize:18,flexShrink:0}}>🌟</span>
                    <div style={{fontSize:11,color:"#A09060",lineHeight:1.6}}>
                      Una vez verificado tu CIF, el local pasará a <strong style={{color:C.text}}>Verificado 🔑</strong> y <strong style={{color:C.gold}}>@{req.claimRest.addedBy}</strong> recibirá el badge <span style={{color:C.gold}}>🌟 Descubridor</span> por haberlo añadido primero.
                    </div>
                  </div>
                </>}
              </div>

              <div style={{fontSize:12,color:"#444",marginBottom:20,lineHeight:1.6}}>
                Al solicitar acceso aceptas los <span style={{color:C.gold}}>Términos y condiciones</span> y la <span style={{color:C.gold}}>Política de privacidad</span> de Xantar.
              </div>
              <button
                onClick={()=>{
                  if(!req.nombre||!req.email){toast2("⚠️ Rellena nombre y email");return;}
                  if(req.claimRest&&!req.cif){toast2("⚠️ Introduce el CIF para reclamar el local");return;}
                  setReqSent(true);
                }}
                style={{...ff,width:"100%",background:"linear-gradient(135deg,#D4A853,#C41E3A)",border:"none",borderRadius:14,padding:16,color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer"}}
              >{req.claimRest?"🏛 Reclamar mi local y solicitar acceso":"Enviar solicitud"}</button>
            </div>
          </>:<>
            <div style={{textAlign:"center",padding:"40px 0"}}>
              <div style={{fontSize:60,marginBottom:20}}>✅</div>
              <div style={{...pf,fontSize:22,fontWeight:700,marginBottom:12}}>¡Solicitud enviada!</div>
              <div style={{fontSize:14,color:C.muted,lineHeight:1.7,marginBottom:32}}>Nuestro equipo revisará tu solicitud en un plazo de <strong style={{color:C.gold}}>24–48 horas</strong>. Recibirás tus credenciales de acceso en el email indicado.</div>
              <div style={{background:"#111",border:`1px solid #222`,borderRadius:14,padding:16,marginBottom:16,textAlign:"left"}}>
                <div style={{fontSize:11,color:C.muted,textTransform:"uppercase",letterSpacing:0.8,marginBottom:10,fontWeight:700}}>Resumen de solicitud</div>
                <div style={{fontSize:13,color:C.text,lineHeight:2}}><span style={{color:C.muted}}>Restaurante:</span> {req.restaurante||detail?.name}<br/><span style={{color:C.muted}}>Contacto:</span> {req.nombre}<br/><span style={{color:C.muted}}>Email:</span> {req.email}{req.cif&&<><br/><span style={{color:C.muted}}>CIF:</span> <span style={{fontFamily:"monospace",color:C.gold}}>{req.cif}</span></>}</div>
              </div>
              {req.cif&&req.claimRest&&<div style={{background:"#1A1A05",border:`1px solid #3A3A1A`,borderRadius:12,padding:"12px 14px",marginBottom:16}}>
                <div style={{fontSize:13,color:C.gold,fontWeight:700,marginBottom:4}}>🌟 Badge Descubridor</div>
                <div style={{fontSize:12,color:C.muted,lineHeight:1.5}}>Una vez verificado tu CIF, <strong style={{color:C.text}}>@{req.claimRest.addedBy}</strong> recibirá automáticamente el badge <span style={{color:C.gold}}>🌟 Descubridor</span> por haber sido el primero en añadir este restaurante a Xantar.</div>
              </div>}
              <button onClick={close} style={{...ff,width:"100%",background:C.card2,border:`1px solid #333`,borderRadius:14,padding:14,color:C.text,fontWeight:600,fontSize:14,cursor:"pointer"}}>Volver al restaurante</button>
            </div>
          </>}
        </div>
      </>}

      {/* ── DASHBOARD ── */}
      {(step==="dashboard"||ownerOk)&&<>
        {/* Header dashboard */}
        <div style={{background:"linear-gradient(135deg,#0D0D1A,#111128)",borderBottom:`1px solid #1A1A3A`,padding:"16px 20px 14px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
            <IBtn onClick={close}>{Ic.back}</IBtn>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:C.green}}/>
              <span style={{fontSize:12,color:C.green,fontWeight:600}}>Sesión activa</span>
            </div>
            <button onClick={()=>{setOwnerOk(false);setStep("login");}} style={{...ff,background:"none",border:`1px solid #333`,borderRadius:8,padding:"5px 10px",color:C.muted,fontSize:12,cursor:"pointer"}}>Salir</button>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:48,height:48,borderRadius:12,overflow:"hidden",flexShrink:0,border:`2px solid #2A2A5A`,background:"#1A1A3A",display:"flex",alignItems:"center",justifyContent:"center"}}>
              {detail?<img src={rests.find(x=>x.id===detail?.id)?.heroImg||rests.find(x=>x.id===detail?.id)?.img} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span style={{fontSize:22}}>🏪</span>}
            </div>
            <div>
              <div style={{...pf,fontSize:16,fontWeight:700,color:C.text}}>{detail?.name||"Mi restaurante"}</div>
              <div style={{fontSize:12,color:C.muted,marginTop:2}}>Panel de gestión · Propietario verificado ✓</div>
            </div>
          </div>
        </div>

        <div style={{padding:"20px 20px 40px"}}>

          {/* Stats rápidas */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:20}}>
            {[
              {n:rests.find(x=>x.id===detail?.id)?.followers?.toLocaleString()||"0",l:"Seguidores",ico:"👥"},
              {n:rests.find(x=>x.id===detail?.id)?.reviews?.toLocaleString()||"0",l:"Reseñas",ico:"⭐"},

            ].map(({n,l,ico})=>(
              <div key={l} style={{background:"#111",border:`1px solid #1A1A2A`,borderRadius:12,padding:"12px 8px",textAlign:"center"}}>
                <div style={{fontSize:18,marginBottom:4}}>{ico}</div>
                <div style={{...pf,fontSize:18,fontWeight:700,color:C.gold}}>{n}</div>
                <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:0.6,marginTop:2}}>{l}</div>
              </div>
            ))}
          </div>

          {/* Imagen portada */}
          <div style={{background:"#0D0D1A",border:`1px solid #2A2A5A`,borderRadius:14,padding:16,marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
              <span style={{fontSize:18}}>🖼</span>
              <div>
                <div style={{fontWeight:700,fontSize:14,color:C.text}}>Imagen de portada</div>
                <div style={{fontSize:11,color:C.muted,marginTop:1}}>Imagen que ven los usuarios al entrar en tu perfil</div>
              </div>
            </div>
            <div style={{position:"relative",height:100,borderRadius:10,overflow:"hidden",marginBottom:12,background:"#1A1A2A"}}>
              <img src={rests.find(x=>x.id===detail?.id)?.heroImg||rests.find(x=>x.id===detail?.id)?.img} alt="portada" style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}} onError={e=>{e.target.style.display="none";}}/>
              <div style={{position:"absolute",inset:0,background:"linear-gradient(transparent 40%,rgba(0,0,0,0.6))"}}/>
              <div style={{position:"absolute",bottom:7,left:10,fontSize:10,color:"#aaa"}}>{rests.find(x=>x.id===detail?.id)?.heroImg?"✅ Personalizada":"📷 Estándar"}</div>
            </div>
            <input style={{...inp,marginBottom:8,fontSize:13}} placeholder="https://turestaurante.com/portada.jpg" defaultValue={rests.find(x=>x.id===detail?.id)?.heroImg||""} id="hero-url-input"/>
            <div style={{display:"flex",gap:8}}>
              <button onClick={async()=>{const val=document.getElementById("hero-url-input")?.value||"";const up=rests.map(r=>r.id===detail?.id?{...r,heroImg:val}:r);await saveR(up);setDetail(p=>({...p,heroImg:val}));toast2(val?"✅ Portada actualizada":"✅ Imagen estándar restaurada");}} style={{...ff,flex:2,background:`linear-gradient(135deg,${C.purple},#5555CC)`,border:"none",borderRadius:10,padding:11,color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>Guardar</button>
              <button onClick={async()=>{const el=document.getElementById("hero-url-input");if(el)el.value="";const up=rests.map(r=>r.id===detail?.id?{...r,heroImg:""}:r);await saveR(up);setDetail(p=>({...p,heroImg:""}));toast2("✅ Imagen estándar restaurada");}} style={{...ff,flex:1,background:"none",border:`1px solid #333`,borderRadius:10,padding:11,color:C.muted,fontSize:13,cursor:"pointer"}}>Resetear</button>
            </div>
          </div>

          {/* Disponibilidad */}
          <div style={{background:"#0A1A0A",border:`1px solid #2A4A2A`,borderRadius:14,padding:16,marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
              <span style={{fontSize:18}}>📅</span>
              <div>
                <div style={{fontWeight:700,fontSize:14,color:C.text}}>Publicar disponibilidad</div>
                <div style={{fontSize:11,color:C.muted,marginTop:1}}>Los usuarios recibirán una notificación inmediata</div>
              </div>

  const RevPanel=()=>{
    const textRef=React.useRef(null);
    const doSubmit=()=>{
      const txt=textRef.current?.value||"";
      if(!txt.trim()){toast2("⚠️ Escribe algo");return;}
      const rv={id:Date.now(),user:profileUser,av:profileImg,rating:revR,text:txt,ts:Date.now()};
      const newRevs=[rv,...(detail?.revs||[])];
      const newRating=parseFloat((newRevs.reduce((a,b)=>a+(b.rating||0),0)/newRevs.length).toFixed(1));
      const up=rests.map(r=>r.id===detail?.id?{...r,revs:newRevs,rating:newRating,reviews:newRevs.length}:r);
      saveR(up);
      setDetail(p=>({...p,revs:newRevs,rating:newRating,reviews:newRevs.length}));
      setRevR(4);setShowRev(false);
      toast2(`✅ Reseña publicada · Nueva valoración: ★${newRating}`);
    };
    return (
    <div style={{position:"absolute",inset:"0 0 60px 0",background:C.bg,zIndex:40,overflowY:"auto"}}>
      <Hdr left={<IBtn onClick={()=>setShowRev(false)}>{Ic.back}</IBtn>} mid="Añadir reseña" right={<button onClick={doSubmit} style={{...ff,background:C.gold,border:"none",borderRadius:8,padding:"7px 16px",color:"#0F0F0F",fontWeight:700,fontSize:13,cursor:"pointer"}}>Publicar</button>}/>

                  <div style={{...pf,fontSize:16,fontWeight:700,color:C.gold}}>{n}</div>

            </div>

            <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center",marginBottom:12}}>

              {r.repsol>0&&<Badge bg={C.orange} color="#fff">{"☀".repeat(r.repsol)} Repsol</Badge>}

                        ?<a href={`tel:${r.rPhone}`} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,background:`linear-gradient(135deg,${C.gold},#B8860B)`,borderRadius:10,padding:"10px 0",color:"#0F0F0F",fontWeight:700,fontSize:14,textDecoration:"none"}}>

                {r.rWeb&&<a href={r.rWeb} target="_blank" rel="noreferrer" style={{display:"flex",alignItems:"center",gap:10,background:"#1A3A2A",border:`1px solid #3A6A3A`,borderRadius:10,padding:"11px 14px",color:C.green,fontWeight:600,fontSize:14,marginBottom:8,textDecoration:"none"}}>

                </a>}

                  <span style={{flexShrink:0}}>{Ic.loc}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:11,color:"#5588AA",marginBottom:1}}>Cómo llegar</div>
                    <div style={{fontSize:13}}>Ver en Google Maps</div>
                  </div>
                  <span style={{fontSize:11,color:"#5588AA"}}>Abrir →</span>
                </a>}
              </>}
              {!oficial.length&&!r.slots?.length&&!(r.rWeb||r.rPhone||r.maps)&&<div style={{fontSize:13,color:C.muted,textAlign:"center",padding:"6px 0"}}>Sin disponibilidad publicada</div>}
            </div>

            {/* Zona Comunidad */}
            <div style={{border:`1px solid ${C.border}`,borderRadius:14,padding:14,marginBottom:14}}>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:14}}>

              </div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                <span style={{fontSize:12,color:C.muted,fontWeight:600}}>Fotos & Reels</span>

        </div>

  // ── Notifs ─────────────────────────────────────────────
  const Notifs=()=>{
    const misReservas=notifs.filter(n=>n.type==="reserva");
    const mesasLibres=notifs.filter(n=>n.type!=="reserva");
    const goToRest=(n)=>{
      const found=rests.find(r=>r.name===n.restaurantName);
      if(found){saveN(notifs.map(x=>x.id===n.id?{...x,read:true}:x));setDetail(found);setTab("detail");}
    };
    const NotifRow=({n,tipo})=>(
      <div onClick={()=>tipo==="libre"?goToRest(n):saveN(notifs.map(x=>x.id===n.id?{...x,read:true}:x))}

        <div style={{flex:1}}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
            <span style={{...pf,fontWeight:700,fontSize:15,color:tipo==="reserva"?C.gold:C.green}}>{n.restaurantName}</span>
            <Badge bg={tipo==="reserva"?"#1A2A3A":"#1A2A1A"} color={tipo==="reserva"?C.blue:C.green}>
              {tipo==="reserva"?"✅ Confirmada":"Mesa libre"}

            <span style={{fontSize:13,color:C.text,fontWeight:600}}>📅 {n.date}</span>
            <span style={{fontSize:13,color:C.text,fontWeight:600}}>🕐 {n.time}</span>
            <span style={{fontSize:13,color:C.text,fontWeight:600}}>👥 {n.pax} pers.</span>
          </div>
          {n.notes&&<div style={{fontSize:12,color:C.muted,marginTop:3}}>💬 {n.notes}</div>}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:5}}>
            <div style={{fontSize:10,color:"#444"}}>{n.ts?new Date(n.ts).toLocaleString():"Ahora"}</div>

          </div>
          {tipo==="reserva"&&<div style={{marginTop:8,display:"flex",gap:8,flexWrap:"wrap"}}>
            {(()=>{const rest=rests.find(r=>r.name===n.restaurantName);return rest?.rPhone&&(
              <a href={`tel:${rest.rPhone}`} style={{...ff,display:"flex",alignItems:"center",gap:5,background:"#0A1A2A",border:"1px solid #1A3A5A",borderRadius:8,padding:"6px 10px",color:C.blue,fontSize:11,fontWeight:600,textDecoration:"none"}}>

        <div style={{padding:"10px 20px 6px",display:"flex",alignItems:"center",gap:8,background:"#0A0A14",borderBottom:`1px solid #1A1A2A`}}>

  // ── Story Viewer ───────────────────────────────────────
  const StoryViewer=()=>{
    if(!viewStory)return null;
    const allImgs=viewStory.allImgs||[{img:viewStory.img,type:viewStory.type}];
    const idx=storyIdx;
    const current=allImgs[idx]||allImgs[0];
    const goNext=()=>{if(idx<allImgs.length-1){setStoryIdx(n=>n+1);}else{setViewStory(null);setStoryIdx(0);}};
    const goPrev=()=>{if(idx>0)setStoryIdx(n=>n-1);};
    useEffect(()=>{
      if(!viewStory)return;
      const t=setTimeout(()=>goNext(),5000);
      return()=>clearTimeout(t);
    },[idx,viewStory]);
    const ago=viewStory.ts?Math.floor((Date.now()-viewStory.ts)/3600000):0;
    return (
      <div style={{position:"fixed",inset:0,zIndex:100,background:"#000",display:"flex",flexDirection:"column"}}>
        <div style={{display:"flex",gap:3,margin:"48px 12px 0"}}>
          {allImgs.map((_,i)=>(
            <div key={i} style={{flex:1,height:3,background:"#333",borderRadius:2,overflow:"hidden"}}>
              <div style={{height:"100%",background:C.gold,animation:i===idx?"storyProg 5s linear forwards":"none",width:i<idx?"100%":"0%"}}/>
            </div>
          ))}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 16px"}}>
          <img src={viewStory.av||"https://i.pravatar.cc/80?img=3"} alt="" style={{width:36,height:36,borderRadius:"50%",objectFit:"cover",border:`2px solid ${C.gold}`}}/>
          <div>
            <div style={{fontWeight:700,fontSize:13,color:"#fff"}}>@{viewStory.user||"usuario"}</div>
            <div style={{fontSize:11,color:"#888"}}>{ago<1?"Ahora":ago+"h"}{ago<24?` · ⏱ ${24-ago}h restantes`:""}</div>
          </div>
          <button onClick={()=>{setViewStory(null);setStoryIdx(0);}} style={{marginLeft:"auto",background:"none",border:"none",color:"#fff",fontSize:20,cursor:"pointer"}}>✕</button>
        </div>
        <div style={{flex:1,position:"relative",display:"flex",alignItems:"center",justifyContent:"center",padding:"0 0 20px"}}>
          <img src={current.img} alt="" style={{maxWidth:"100%",maxHeight:"100%",objectFit:"contain",display:"block"}}/>
          {current.type==="reel"&&<div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",background:"rgba(0,0,0,0.6)",borderRadius:"50%",width:64,height:64,display:"flex",alignItems:"center",justifyContent:"center"}}>{Ic.play}</div>}
          <div onClick={goPrev} style={{position:"absolute",left:0,top:0,bottom:0,width:"35%",cursor:"pointer"}}/>
          <div onClick={goNext} style={{position:"absolute",right:0,top:0,bottom:0,width:"35%",cursor:"pointer"}}/>
        </div>
        {allImgs.length>1&&<div style={{textAlign:"center",paddingBottom:12,fontSize:11,color:"#555"}}>{idx+1} / {allImgs.length}</div>}
      </div>
    );
  };

  // ── Comments Panel ─────────────────────────────────────
  const CommentsPanel=()=>{
    const post=activePost;
    if(!post)return null;
    const postComments=comments[post.id]||[];
    const inputRef=React.useRef(null);
    const [hasText,setHasText]=React.useState(false);
    const addComment=()=>{
      const txt=inputRef.current?.value?.trim()||"";
      if(!txt)return;
      const nc={id:Date.now(),user:profileUser,av:profileImg,text:txt,ts:Date.now()};
      const newComments={...comments,[post.id]:[...(comments[post.id]||[]),nc]};
      saveComments(newComments);
      if(inputRef.current)inputRef.current.value="";
      setHasText(false);
    };
    return (
    <div style={{position:"absolute",inset:"0 0 60px 0",background:C.bg,zIndex:55,display:"flex",flexDirection:"column"}}>
      <Hdr left={<IBtn onClick={()=>{setShowComments(false);}}>{Ic.back}</IBtn>} mid="Comentarios"/>

  // ── Chat Panel ─────────────────────────────────────────
  const ChatPanel=()=>{
    if(!chatWith)return null;
    const key=chatWith.user;
    React.useEffect(()=>{setChatRead(r=>({...r,[key]:Date.now()}));},[key]);
    const msgs=chats[key]||[];
    const inputRef=React.useRef(null);
    const bottomRef=React.useRef(null);
    React.useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});},[chats,key]);
    const send=()=>{
      const txt=inputRef.current?.value?.trim()||"";
      if(!txt)return;
      const msg={id:Date.now(),from:profileUser||"yo",text:txt,ts:Date.now()};
      setChats(prev=>({...prev,[key]:[...(prev[key]||[]),msg]}));
      if(inputRef.current)inputRef.current.value="";

                <div style={{display:"flex",gap:16}}>
                  {[
                    {n:userProfile.posts?.length||0,l:"Posts"},
                    {n:userProfile.followers,l:"Seguidores"},
                    {n:userProfile.siguiendo,l:"Siguiendo"},
                  ].map(({n,l})=>(
                    <div key={l} style={{textAlign:"center"}}>
                      <div style={{...pf,fontSize:17,fontWeight:700,color:C.gold}}>{n}</div>
                      <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:0.6}}>{l}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
            <div style={{...pf,fontSize:16,fontWeight:700,marginBottom:4}}>{userProfile.user}</div>
            <div style={{fontSize:13,color:C.muted,marginBottom:16,lineHeight:1.5}}>{userProfile.bio}</div>
            <div style={{display:"flex",gap:10,marginBottom:20}}>
              <button onClick={()=>{const isFollowed=followedUsers[userProfile.user];const nf={...followedUsers,[userProfile.user]:!isFollowed};setFollowedUsers(nf);toast2(isFollowed?`Dejaste de seguir a @${userProfile.user}`:`✅ Siguiendo a @${userProfile.user}`);}} style={{...ff,flex:1,background:followedUsers[userProfile.user]?C.card2:`linear-gradient(135deg,${C.gold},#B8860B)`,border:followedUsers[userProfile.user]?`1px solid ${C.gold}`:"none",borderRadius:10,padding:"10px 0",color:followedUsers[userProfile.user]?C.gold:"#0F0F0F",fontWeight:700,fontSize:14,cursor:"pointer"}}>{followedUsers[userProfile.user]?"✓ Siguiendo":"+ Seguir"}</button>
              <button onClick={()=>{setChatWith({user:userProfile.user,av:userProfile.av,isRest:false});setChatFromList(false);setShowChat(true);}} style={{...ff,flex:1,background:C.card2,border:`1px solid #2A2A2A`,borderRadius:10,padding:"10px 0",color:C.text,fontWeight:600,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>{Ic.comment} Mensaje</button>
            </div>
          </div>
          {/* Grid de posts */}
          <div style={{borderTop:`1px solid ${C.border}`}}>
            <div style={{padding:"12px 16px 8px",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:C.muted}}>Publicaciones</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:2}}>
              {(userProfile.posts||[]).map((p,i)=>(
                <div key={i} style={{position:"relative",aspectRatio:"1/1",overflow:"hidden"}}>
                  <img src={p.img} alt={p.rest} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
                  <div style={{position:"absolute",bottom:0,left:0,right:0,padding:"20px 6px 5px",background:"linear-gradient(transparent,rgba(0,0,0,0.7))"}}>
                    <div style={{fontSize:9,color:"#fff",fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>📍 {p.rest}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
          <div style={{height:20}}/>
        </div>
      )}
      {toast&&<div style={{position:"absolute",bottom:70,left:"50%",transform:"translateX(-50%)",background:C.card2,border:`1px solid ${C.gold}`,color:C.text,borderRadius:12,padding:"12px 20px",fontSize:14,fontWeight:500,zIndex:100,whiteSpace:"nowrap",boxShadow:"0 8px 30px rgba(0,0,0,0.6)"}}>{toast}</div>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(ForkStar));
  </script>
</body>
</html>
